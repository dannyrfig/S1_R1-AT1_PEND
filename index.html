<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rápido Seguro Logistica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="d-flex justify-content-center py-3"> 
    <!-- Classes do Bootstrap (d-flex, justify-content-center, py-3) para centralizar o menu e adicionar espaçamento vertical -->
    <ul class="nav nav-pills">
        <!-- Classe nav nav-pills para criar menu de navegação em formato de abas -->
        <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">Home</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Cadastrar Pedidos</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Rastrear Pedido</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Área vendedor</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Contato</a></li>
    </ul>
</header>

<div class="card-body .col-xs-6 .col-md-4"> 
    <!-- Classe card-body para organizar como cartão e colunas para responsividade -->
    <h1 class="text-center">Rápido Seguro Logistíca</h1>
    <img src="./logo.png" class="img-fluid" id="logo" alt="logo">
    <!-- Classe img-fluid para deixar a imagem responsiva -->
</div>

<div class="d-flex justify-content-center align-items-center" style="min-height: 50vh;">
    <!-- d-flex, justify-content-center e align-items-center para centralização horizontal e vertical -->
    <form class="p-4 border rounded">
        <!-- p-4 para espaçamento interno, border para borda e rounded para bordas arredondadas -->
        <div class="mb-3">
            <label>E-mail:</label>
            <input type="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" 
                title="Digite um e-mail válido">
            <!-- type="email", required e pattern para validação do e-mail -->
            <label>Senha:</label>
            <input type="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button> 
        <!-- btn btn-primary para estilização do botão -->
        <a href="#">Esqueci minha senha</a>
    </form>
</div>

<footer class="py-3 my-4">
    <ul class="nav justify-content-center border-bottom pb-3 mb-3"> 
        <!-- nav e justify-content-center para centralizar os links e border-bottom para linha inferior -->
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Home</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Cadastrar Pedidos</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Rastrear Pedido</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Área vendedor</a></li>
        <li class="nav-item"><a href="#" class="nav-link px-2 text-body-secondary">Contato</a></li>
    </ul>
    <p class="text-center text-body-secondary">© 2067 Rápido Seguro Logistíca</p> 
    <!-- text-center para centralizar o texto e text-body-secondary para cor mais suave -->
</footer>
